<section class="page-card">
    <div class="page-card-header">
        <h2>Cadastro rapido</h2>
    </div>
    <form class="stack-form">
        <div class="field-grid">
            <label class="field">
                <span>Titulo</span>
                <input type="text" placeholder="Titulo da oportunidade">
            </label>
            <label class="field">
                <span>Orgao</span>
                <input type="text" placeholder="Nome do orgao">
            </label>
        </div>
        <label class="field">
            <span>Resumo</span>
            <textarea rows="4" placeholder="Resumo objetivo da licitacao"></textarea>
        </label>
        <div class="form-actions">
            <button type="button">Registrar</button>
        </div>
    </form>
</section>
