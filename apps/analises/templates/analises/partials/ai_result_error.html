<article class="surface-card ai-result-card ai-result-card-error p-4 h-100">
    <div class="mb-3">
        <p class="eyebrow mb-2">IA</p>
        <h3 class="h5 mb-1">{{ result_title|default:"Falha ao processar" }}</h3>
        <p class="text-secondary mb-0">Nao foi possivel concluir esta tarefa de IA com os dados enviados.</p>
    </div>
    <div class="alert alert-danger mb-0 rounded-4">
        <div class="fw-semibold mb-2">Revise o envio</div>
        <ul class="mb-0 ps-3">
            {% for message in error_messages %}
                <li>{{ message }}</li>
            {% empty %}
                <li>Ocorreu um erro inesperado na execucao da analise.</li>
            {% endfor %}
        </ul>
    </div>
</article>
