<article class="surface-card kpi-card kpi-card-{{ tone|default:'primary' }} dashboard-hover-lift rounded-4 border-0 shadow-sm p-4">
    <div class="d-flex align-items-start justify-content-between gap-3 mb-4">
        <div>
            <p class="kpi-label mb-2">{{ title }}</p>
            <h3 class="kpi-value {% if title == 'Valor estimado' %}kpi-value-compact{% endif %} mb-0">{{ value }}</h3>
        </div>
        <span class="kpi-icon">
            {% if icon == "building" %}
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 20h16v-2H4v2Zm2-4h3V4H6v12Zm5 0h3V8h-3v8Zm5 0h2V2h-2v14Z" fill="currentColor"/>
                </svg>
            {% elif icon == "pulse" %}
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M3 12h4l2.5-5 4 10 2.5-5H21" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
                </svg>
            {% elif icon == "chart" %}
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M5 19V9m7 10V5m7 14v-7" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2"/>
                </svg>
            {% elif icon == "users" %}
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M16 11a3 3 0 1 0-2.99-3.28A3 3 0 0 0 16 11ZM8 12a3 3 0 1 0-3-3 3 3 0 0 0 3 3Zm8 1c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4ZM8 14c-2.33 0-7 1.17-7 3.5V19h7v-2c0-.93.38-1.78 1-2.45A7.56 7.56 0 0 0 8 14Z" fill="currentColor"/>
                </svg>
            {% elif icon == "shield" %}
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 2 4 6v5c0 5.2 3.4 10 8 11 4.6-1 8-5.8 8-11V6l-8-4Zm-1 11.2-2.1-2.1 1.4-1.4 0.7 0.7 2.7-2.7 1.4 1.4-4.1 4.1Z" fill="currentColor"/>
                </svg>
            {% elif icon == "key" %}
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M14 3a7 7 0 1 0 6.71 9H23v3h-3v2h-3v2h-3.29A7 7 0 0 0 14 3Zm0 4a3 3 0 1 1 0 6 3 3 0 0 1 0-6Z" fill="currentColor"/>
                </svg>
            {% elif icon == "search" %}
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M10.5 4a6.5 6.5 0 1 0 4.05 11.58l4.43 4.44 1.42-1.42-4.44-4.43A6.5 6.5 0 0 0 10.5 4Z" fill="currentColor"/>
                </svg>
            {% else %}
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M6 4h12l2 4-8 12L4 8l2-4Zm1.2 4 4.8 7.2L16.8 8H7.2Z" fill="currentColor"/>
                </svg>
            {% endif %}
        </span>
    </div>
    <p class="kpi-helper mb-0">{{ helper }}</p>
</article>
